name: Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build DocC Documentation
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate documentation with DocC
        run: |
          mkdir -p docs

          # Generate docs for each public target
          for target in StreamDownCore StreamDownUI StreamDownUIKit StreamDownCode StreamDownMath StreamDownDiagram StreamDownCJK; do
            echo "Generating docs for $target..."
            swift package --allow-writing-to-directory ./docs/$target \
              generate-documentation --target $target \
              --disable-indexing \
              --transform-for-static-hosting \
              --hosting-base-path /StreamDown/$target \
              --output-path ./docs/$target

            if [ ! -f "./docs/$target/index.html" ]; then
              echo "Warning: index.html not found for $target"
            else
              echo "Successfully generated docs for $target"
            fi
          done

          # Prevent Jekyll processing on GitHub Pages
          touch ./docs/.nojekyll

          echo "Generated documentation targets:"
          ls -la ./docs/ | grep "^d" | awk '{print $NF}'

      - name: Fix filenames for artifact upload
        run: |
          # GitHub Actions artifact upload does not support colons in filenames
          # (DocC generates files like "SomeType-swift.struct.html")
          cat > /tmp/fix_colons.py << 'PYTHON_EOF'
          import os
          import glob
          from pathlib import Path

          def build_rename_map(root_dir):
              rename_map = {}
              root_path = Path(root_dir)
              for path in root_path.rglob("*"):
                  if ":" in path.name:
                      new_name = path.name.replace(":", "-")
                      new_path = path.with_name(new_name)
                      old_rel = path.relative_to(root_path).as_posix()
                      new_rel = new_path.relative_to(root_path).as_posix()
                      rename_map[old_rel] = new_rel
              return rename_map

          def apply_renames(root_dir, rename_map):
              root_path = Path(root_dir)
              for old_rel in sorted(rename_map.keys(), key=lambda p: p.count("/"), reverse=True):
                  old_path = root_path / old_rel
                  new_path = root_path / rename_map[old_rel]
                  if old_path.exists():
                      os.rename(old_path, new_path)

          def build_replacements(rename_map):
              replacements = []
              for old_rel, new_rel in rename_map.items():
                  replacements.append((old_rel, new_rel))
                  replacements.append(("/" + old_rel, "/" + new_rel))
              return replacements

          def replace_all(content, replacements):
              for old_value, new_value in replacements:
                  content = content.replace(old_value, new_value)
              return content

          rename_map = build_rename_map('./docs')
          apply_renames('./docs', rename_map)

          files_to_update = []
          files_to_update.extend(glob.glob('./docs/**/*.json', recursive=True))
          files_to_update.extend(glob.glob('./docs/**/*.html', recursive=True))

          replacements = build_replacements(rename_map)
          for path in files_to_update:
              try:
                  with open(path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  updated = replace_all(content, replacements)
                  if updated != content:
                      with open(path, 'w', encoding='utf-8') as f:
                          f.write(updated)
              except Exception as e:
                  print(f"Error processing {path}: {e}")

          remaining = [
              os.path.join(root, name)
              for root, dirs, files in os.walk('./docs')
              for name in dirs + files
              if ':' in name
          ]
          if remaining:
              print(f"WARNING: {len(remaining)} paths with colons still remain")
          else:
              print("All filenames cleaned successfully")
          PYTHON_EOF

          python3 /tmp/fix_colons.py

      - name: Create landing page
        run: |
          cat > ./docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>StreamDown Documentation</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                line-height: 1.6;
                color: #1d1d1f;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                min-height: 100vh;
                padding: 2rem;
              }
              .container { max-width: 1100px; margin: 0 auto; }
              header { text-align: center; color: white; margin-bottom: 3rem; }
              header h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
              header p { font-size: 1.1rem; opacity: 0.8; }
              .badge {
                display: inline-block;
                background: rgba(255,255,255,0.15);
                color: white;
                padding: 0.2rem 0.7rem;
                border-radius: 12px;
                font-size: 0.85rem;
                margin-top: 0.5rem;
              }
              .section-title {
                color: rgba(255,255,255,0.6);
                font-size: 0.75rem;
                font-weight: 600;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                margin: 2rem 0 1rem;
              }
              .targets {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 1.25rem;
              }
              .target-card {
                background: rgba(255,255,255,0.05);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 12px;
                padding: 1.5rem;
                text-decoration: none;
                color: white;
                display: block;
                transition: background 0.2s ease, transform 0.2s ease;
              }
              .target-card:hover {
                background: rgba(255,255,255,0.1);
                transform: translateY(-2px);
              }
              .target-card h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
              .target-card p { font-size: 0.85rem; opacity: 0.65; margin-bottom: 1rem; line-height: 1.4; }
              .target-card .link { font-size: 0.8rem; opacity: 0.8; }
              .tag {
                display: inline-block;
                background: rgba(255,255,255,0.1);
                border-radius: 4px;
                padding: 0.1rem 0.4rem;
                font-size: 0.7rem;
                margin-bottom: 0.6rem;
                opacity: 0.7;
              }
              footer { text-align: center; color: rgba(255,255,255,0.5); margin-top: 3rem; font-size: 0.85rem; }
              footer a { color: rgba(255,255,255,0.7); }
              @media (max-width: 600px) {
                header h1 { font-size: 2rem; }
                .targets { grid-template-columns: 1fr; }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <header>
                <h1>StreamDown</h1>
                <p>Native iOS streaming markdown renderer for AI-generated content</p>
                <span class="badge">iOS 16+ · macOS 13+ · Swift 5.9+</span>
              </header>

              <p class="section-title">Core</p>
              <div class="targets">
                <a href="./StreamDownCore/" class="target-card">
                  <div class="tag">KMP-portable</div>
                  <h2>StreamDownCore</h2>
                  <p>Incremental parser, token types, theming primitives, and the renderer protocol. Zero platform imports — designed for Kotlin Multiplatform portability.</p>
                  <span class="link">View Documentation →</span>
                </a>
                <a href="./StreamDownUI/" class="target-card">
                  <div class="tag">SwiftUI</div>
                  <h2>StreamDownUI</h2>
                  <p>StreamDownView and all GFM block views for SwiftUI. Three input modes: stream, static markdown, and binding-driven.</p>
                  <span class="link">View Documentation →</span>
                </a>
                <a href="./StreamDownUIKit/" class="target-card">
                  <div class="tag">UIKit</div>
                  <h2>StreamDownUIKit</h2>
                  <p>StreamDownUIView — a pure UIView subclass with correct intrinsicContentSize. No UIHostingController bridge.</p>
                  <span class="link">View Documentation →</span>
                </a>
              </div>

              <p class="section-title">Optional Add-ons</p>
              <div class="targets">
                <a href="./StreamDownCode/" class="target-card">
                  <h2>StreamDownCode</h2>
                  <p>Syntax highlighting for code blocks. Deferred until block closes to avoid mid-token colour artifacts.</p>
                  <span class="link">View Documentation →</span>
                </a>
                <a href="./StreamDownMath/" class="target-card">
                  <h2>StreamDownMath</h2>
                  <p>LaTeX rendering via KaTeX and WKWebView. Handles fenced code blocks with language "math" or "latex".</p>
                  <span class="link">View Documentation →</span>
                </a>
                <a href="./StreamDownDiagram/" class="target-card">
                  <h2>StreamDownDiagram</h2>
                  <p>Mermaid diagram rendering. Shows a placeholder while streaming, renders on block close.</p>
                  <span class="link">View Documentation →</span>
                </a>
                <a href="./StreamDownCJK/" class="target-card">
                  <h2>StreamDownCJK</h2>
                  <p>CJK ideographic punctuation normalization and CJK–Latin kerning correction.</p>
                  <span class="link">View Documentation →</span>
                </a>
              </div>

              <footer>
                <p>
                  <a href="https://github.com/paduh/StreamDown">GitHub</a> ·
                  <a href="https://github.com/paduh/StreamDown/issues">Issues</a> ·
                  MIT License
                </p>
              </footer>
            </div>
          </body>
          </html>
          EOF

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: ./docs
          retention-days: 30

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: ./docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
